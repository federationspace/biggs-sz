---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: epub-only
  namespace: media
spec:
  hostnames:
    - epub-only.gregbob.net
  parentRefs:
    - name: wildcard-gregbob-net
      namespace: networking
  rules:
    - backendRefs:
        - name: epub-only-service
          port: 8080
      matches:
        - path:
            type: PathPrefix
            value: /
