apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: rreading-glasses
  name: rreading-glasses
  namespace: media
spec:
  template:
    metadata:
      labels:
        app: rreading-glasses
    spec:
      containers:
        # Workaround for upstream bug: Hardcover rejects GraphQL requests with
        # more than 5 top-level fields (HTTP 403 top_level_limit_exceeded), which
        # rreading-glasses' batcher (hardcoded 25) trips on every batch. On the
        # /search path the errors are silently swallowed, so Readarr sees empty
        # results. This patched image caps the batch at 5 and makes it
        # configurable via BATCH_SIZE. Revert to blampe/rreading-glasses:hardcover
        # once upstream PR #575 is merged.
        #   https://github.com/blampe/rreading-glasses/issues/574
        #   https://github.com/blampe/rreading-glasses/pull/575
        - image: docker.io/shrinedogg/rreading-glasses:hardcover-batch5
          imagePullPolicy: Always
          name: rreading-glasses
          command: ["/main", "serve"]
          args:
            - --verbose
          env:
            - name: POSTGRES_HOST
              value: "cnpg-rreading-glasses-rw.cnpg-system.svc.cluster.local"
            - name: POSTGRES_USER
              value: "rreading-glasses"
            - name: POSTGRES_DATABASE
              value: "rreading-glasses"
          envFrom:
            - secretRef:
                name: rreading-glasses-secret
          ports:
            - name: http
              containerPort: 8788
              protocol: TCP
          readinessProbe:
            tcpSocket:
              port: 8788
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8788
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              memory: 128Mi
            limits:
              # The app grows an in-memory cache to fill available memory,
              # so keep a hard limit (upstream recommendation).
              memory: 512Mi
      dnsPolicy: ClusterFirst
      restartPolicy: Always
  selector:
    matchLabels:
      app: rreading-glasses
