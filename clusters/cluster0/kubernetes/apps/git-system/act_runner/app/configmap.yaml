---
apiVersion: v1
kind: ConfigMap
metadata:
  name: act-runner-config
  namespace: git-system
data:
  config.yaml: |
    log:
      level: info
    runner:
      file: /data/.runner
      capacity: 1
      timeout: 3h
      insecure: false
      fetch_timeout: 5s
      fetch_interval: 2s
    container:
      docker_host: "-"
