---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: act-runner
  namespace: git-system
  labels:
    app: act-runner
spec:
  replicas: 1
  selector:
    matchLabels:
      app: act-runner
  template:
    metadata:
      labels:
        app: act-runner
    spec:
      containers:
        - name: act-runner
          image: gitea/act_runner:latest
          imagePullPolicy: Always
          env:
            - name: GITEA_INSTANCE_URL
              value: "https://git.gregbob.net"
            - name: GITEA_RUNNER_REGISTRATION_TOKEN
              valueFrom:
                secretKeyRef:
                  name: act-runner-token
                  key: token
            - name: GITEA_RUNNER_NAME
              value: "cluster0-runner"
            - name: DOCKER_HOST
              value: "tcp://localhost:2375"
          volumeMounts:
            - name: runner-data
              mountPath: /data
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 2000m
              memory: 2Gi
        - name: docker-dind
          image: docker:dind
          securityContext:
            privileged: true
          env:
            - name: DOCKER_TLS_CERTDIR
              value: ""
          volumeMounts:
            - name: docker-data
              mountPath: /var/lib/docker
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              cpu: 2000m
              memory: 4Gi
      volumes:
        - name: runner-data
          persistentVolumeClaim:
            claimName: act-runner-data
        - name: docker-data
          emptyDir: {}
      restartPolicy: Always
