---
# Pull secret for git.gregbob.net container registry.
# Create a 1Password item named "gitea-registry-pull-secret" with a field
# "dockerconfigjson" containing:
#   {"auths":{"git.gregbob.net":{"username":"szkud","password":"<token>","auth":"<base64 of szkud:<token>>"}}}
# Generate the auth value with: echo -n "szkud:<token>" | base64
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: gitea-registry-pull-secret
  namespace: gregbob
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    creationPolicy: Owner
    template:
      type: kubernetes.io/dockerconfigjson
  data:
    - secretKey: .dockerconfigjson
      remoteRef:
        key: gitea-registry-pull-secret
        property: dockerconfigjson
